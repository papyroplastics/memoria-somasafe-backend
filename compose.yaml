# Only the external services run in containers; the API gateway and the Celery
# worker run on the host via uv (see the Makefile). These are bound to localhost
# since only the host-run API needs to reach them — the phone talks to the API.
services:
  postgres:
    image: docker.io/library/postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - 127.0.0.1:5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: docker.io/library/redis:8-alpine
    ports:
      - 127.0.0.1:6379:6379
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
