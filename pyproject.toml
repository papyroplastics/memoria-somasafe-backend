[project]
name = "tensorflow-example"
version = "1.0.0"
description = "Aprendiendo TensorFlow"
readme = "README.md"
requires-python = "==3.13.*"
dependencies = [
    "tensorflow==2.21.*",
    "matplotlib==3.10.*",
    "pyqt6==6.11.*",
    "ai-edge-litert>=2.1.4",
    "numpy>=2.4.*",
]

[dependency-groups]
dev = [
  "ipython",
  "pyrefly",
  "types-tensorflow",
]

[tool.pyrefly]
python-platform = "linux"
project-includes = [
    "*.py",
]

[tool.pyrefly.errors]
implicit-import = false

